<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Contact — AeroFlux</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/assets/styles.css"/>
</head>
<body>
  <div id="_navbar"></div>

  <main class="container py-6">
    <div class="row g-5">
      <div class="col-lg-6">
        <h1 class="fw-800">Talk to the team</h1>
        <p class="text-muted">Collabs, media, questions — we reply fast.</p>
        <form class="needs-validation" novalidate>
          <div class="row g-3">
            <div class="col-md-6"><label class="form-label">Name</label><input class="form-control" required></div>
            <div class="col-md-6"><label class="form-label">Email</label><input type="email" class="form-control" required></div>
            <div class="col-12"><label class="form-label">Message</label><textarea class="form-control" rows="5" required></textarea></div>
            <div class="col-12"><button class="btn btn-primary btn-lg" type="submit">Send</button></div>
          </div>
        </form>
      </div>
      <div class="col-lg-6">
        <div class="p-4 rounded-4 bg-body-tertiary border">
          <h4 class="fw-800">Visit</h4>
          <p class="small text-muted mb-0">Livermore, CA • By appointment only</p>
        </div>
      </div>
    </div>
  </main>

  <div id="_footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/app.js"></script>
</body>
</html>
