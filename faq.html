<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>FAQ — AeroFlux</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet"/>
  <link rel="icon" href="assets/favicon.svg"/>
  <link rel="stylesheet" href="assets/styles.css"/>
</head>
<body>
  <div id="_navbar"></div>

  <main class="container py-6">
    <h1 class="fw-800 mb-4">FAQs</h1>
    <div class="accordion" id="faq">
      <div class="accordion-item">
        <h2 class="accordion-header"><button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#c1">Is this legal to fly?</button></h2>
        <div id="c1" class="accordion-collapse collapse show" data-bs-parent="#faq"><div class="accordion-body">We’re developing with current regulations in mind and will share certification updates as we go.</div></div>
      </div>
      <div class="accordion-item">
        <h2 class="accordion-header"><button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#c2">Where can I test it?</button></h2>
        <div id="c2" class="accordion-collapse collapse" data-bs-parent="#faq"><div class="accordion-body">Pilot days roll out to major US cities. Join the preorder list for invites.</div></div>
      </div>
      <div class="accordion-item">
        <h2 class="accordion-header"><button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#c3">Refund policy?</button></h2>
        <div id="c3" class="accordion-collapse collapse" data-bs-parent="#faq"><div class="accordion-body">Deposits are fully refundable before production lock.</div></div>
      </div>
    </div>
  </main>

  <div id="_footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
