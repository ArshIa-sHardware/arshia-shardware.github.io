<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Preorder — AeroFlux</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/assets/styles.css"/>
</head>
<body>
  <div id="_navbar"></div>

  <main class="container py-6">
    <div class="row g-5">
      <div class="col-lg-7">
        <h1 class="fw-800">Reserve your AeroFlux</h1>
        <p class="text-muted">Fully refundable. Lock in launch pricing and pilot training slot.</p>
        <form class="needs-validation" novalidate>
          <div class="row g-3">
            <div class="col-md-6"><label class="form-label">First name</label><input class="form-control" required></div>
            <div class="col-md-6"><label class="form-label">Last name</label><input class="form-control" required></div>
            <div class="col-12"><label class="form-label">Email</label><input type="email" class="form-control" required></div>
            <div class="col-12"><label class="form-label">Model</label>
              <select class="form-select" required><option value="">Choose...</option><option>One</option><option>S</option><option>X</option></select>
            </div>
            <div class="col-12"><label class="form-label">City</label><input class="form-control" required></div>
            <div class="col-12"><label class="form-label">Notes</label><textarea class="form-control" rows="4" placeholder="Tell us your use case"></textarea></div>
            <div class="col-12 d-grid d-sm-block"><button class="btn btn-primary btn-lg" type="submit">Place $100 deposit</button></div>
          </div>
        </form>
      </div>
      <div class="col-lg-5">
        <div class="p-4 rounded-4 bg-body-tertiary border">
          <h4 class="fw-800">Founding perks</h4>
          <ul class="small text-muted">
            <li>Launch pricing locked</li>
            <li>Priority delivery window</li>
            <li>Pilot training invite</li>
            <li>Exclusive founder badge</li>
          </ul>
        </div>
      </div>
    </div>
  </main>

  <div id="_footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/app.js"></script>
</body>
</html>
